<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="write-like-me: a self-improving writing-voice system for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14161f"/>
      <stop offset="1" stop-color="#1d2233"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e7ecff"/>
      <stop offset="1" stop-color="#9db2ff"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="338" rx="19" fill="none" stroke="#2c3350" stroke-width="2"/>

  <!-- wordmark -->
  <text x="80" y="140" font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="72" font-weight="700" fill="url(#ink)">write-like-me</text>
  <text x="84" y="188" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="27" fill="#aeb6d6">A self-improving writing-voice system for Claude Code.</text>
  <text x="84" y="224" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="20" fill="#6f7aa3">Drafts in your voice. Learns from your corrections. Your data stays local.</text>

  <!-- the loop, as five connected nodes along the bottom -->
  <g font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="16" fill="#c7cdec" text-anchor="middle">
    <line x1="180" y1="286" x2="360" y2="286" stroke="#3a4266" stroke-width="2"/>
    <line x1="360" y1="286" x2="560" y2="286" stroke="#3a4266" stroke-width="2"/>
    <line x1="560" y1="286" x2="760" y2="286" stroke="#3a4266" stroke-width="2"/>
    <line x1="760" y1="286" x2="960" y2="286" stroke="#3a4266" stroke-width="2"/>

    <circle cx="180" cy="286" r="9" fill="#7d8cff"/>
    <text x="180" y="318">Draft</text>
    <circle cx="360" cy="286" r="9" fill="#8f9bff"/>
    <text x="360" y="318">Iterate</text>
    <circle cx="560" cy="286" r="9" fill="#a0a9ff"/>
    <text x="560" y="318">Observe</text>
    <circle cx="760" cy="286" r="9" fill="#b2b7ff"/>
    <text x="760" y="318">Promote</text>
    <circle cx="960" cy="286" r="9" fill="#c4c6ff"/>
    <text x="960" y="318">Audit</text>

    <!-- loop-back arc from Audit to Draft -->
    <path d="M 960 275 C 960 250, 180 250, 180 275" fill="none" stroke="#3a4266" stroke-width="2" stroke-dasharray="4 5"/>
  </g>

</svg>
